networks:
  inception_net:
    driver: bridge
volumes:
  db_data:
  wp_data:
services:
  wp-app:
    build: "./requirements/wp/."
    image: wp-image:latest
    tty: true
    stdin_open: true
    container_name: "wp-instance"
    networks:
      - inception_net
    depends_on:
      - database
    volumes:
      - wp_data:/app/wordpress/
    environment:
      DB_HOST: database
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DOMAIN_NAME: ${DOMAIN_NAME}
      WP_TITLE: ${WP_TITLE}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
  webserver:
    build: "./requirements/nginx/."
    image: nginx-image:latest
    container_name: "nginx-instance"
    ports:
      - "443:443"
    networks:
      - inception_net
    depends_on:
      - wp-app
    volumes:
      - wp_data:/app/wordpress/
  database:
    build: "./requirements/mariadb/."
    image: mariadb-image:latest
    container_name: "mariadb-instance"
    networks:
      - inception_net
    volumes: 
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
